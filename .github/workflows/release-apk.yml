name: Publish APK

on:
  push:
    tags:
      - "beta/**"
      - "v*"

permissions:
  contents: write

concurrency:
  group: apk-${{ github.ref }}

jobs:
  publish:
    name: Build and publish APK
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and download APK
        id: apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF_NAME" == beta/* ]]; then
            profile="beta-apk"
          else
            profile="production-apk"
          fi

          bunx eas-cli@latest build \
            --platform android \
            --profile "$profile" \
            --non-interactive \
            --wait \
            --json > "$RUNNER_TEMP/eas-build.json"

          build_url="$(jq -r '.[0].artifacts.buildUrl // empty' "$RUNNER_TEMP/eas-build.json")"
          test -n "$build_url"

          release_name="${GITHUB_REF_NAME//\//-}"
          apk_path="$RUNNER_TEMP/edumfa-authenticator-$release_name.apk"
          curl --fail --location "$build_url" --output "$apk_path"
          echo "path=$apk_path" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          APK_PATH: ${{ steps.apk.outputs.path }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$APK_PATH" --clobber
            exit 0
          fi

          release_flags=()
          if [[ "$GITHUB_REF_NAME" == beta/* ]]; then
            release_flags+=(--prerelease)
          fi

          gh release create "$GITHUB_REF_NAME" "$APK_PATH" \
            --verify-tag \
            --generate-notes \
            --title "$GITHUB_REF_NAME" \
            "${release_flags[@]}"
