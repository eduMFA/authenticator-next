name: Release Production

on:
  push:
    tags:
      - "v*"

jobs:
  build_android:
    name: Build Android production
    type: build
    params:
      platform: android
      profile: production

  build_ios:
    name: Build iOS production
    type: build
    params:
      platform: ios
      profile: production

  require_approval:
    name: Approve production submission
    needs: [build_android, build_ios]
    type: require-approval

  submit_android:
    name: Submit Android to Google Play production
    needs: [require_approval, build_android]
    type: submit
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: production

  submit_ios:
    name: Submit iOS to App Store Connect
    needs: [require_approval, build_ios]
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production
